name: Daily Grant Agent

on:
  schedule:
    - cron: "0 12 * * *"  # Daily at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-grant-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run grant pool agent
        run: python agent/grant_pool_agent.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "SolarPunk Grant Agent"
          git config user.email "solarpunk-agent@users.noreply.github.com"
          git add data/ FUNDED.md
          git commit -m "chore: daily grant agent cycle $(date -u +%Y-%m-%d)"
          git push
